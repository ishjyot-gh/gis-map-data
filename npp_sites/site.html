<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Details</title>
    <link rel="stylesheet" href="../lib/leaflet/leaflet.css">
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <div class="site-layout">
        <aside class="site-sidebar">
            <button class="back-button" type="button" onclick="window.location.href='../index.html'">Back</button>

            <header class="site-header">
                <p id="siteStatus" class="site-status"></p>
                <h1 id="siteName">Site Details</h1>
                <p id="siteDescription" class="site-description"></p>
            </header>

            <section>
                <h2>Site Data</h2>
                <dl id="siteDetails" class="site-details"></dl>
            </section>
        </aside>

        <div id="siteMap"></div>
    </div>

    <script src="../lib/leaflet/leaflet.js"></script>
    <script src="./map_common.js"></script>
    <script src="./site_detail.js"></script>
</body>

</html>
